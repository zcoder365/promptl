<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promptl — Login</title>
    <link rel="shortcut icon" href="/static/assets/favicon.png" type="image/x-icon">

    <!-- nunito font (matches the rest of the app) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/styles.css">
</head>
<!-- 🆕 add 'auth-page' class to body so it gets the gradient background -->
<body class="auth-page">

    <!-- 🆕 single white card holds everything, centered automatically by flexbox -->
    <div class="auth-card">

        <img src="/static/assets/logo.png" alt="promptl logo" class="auth-logo">
        <h1 class="auth-title">Welcome back!</h1>
        <p class="auth-subtitle">Login to keep your streak going 🔥</p>

        <!-- error message slot — hidden until something fails -->
        <div id="error-msg" class="auth-error" style="display:none;"></div>

        <!-- email/password form -->
        <form id="login-form" class="auth-form">
            <div class="auth-field">
                <label for="email" class="auth-label">Email</label>
                <input type="email" id="email" class="auth-input" placeholder="you@example.com" required>
            </div>

            <div class="auth-field">
                <label for="password" class="auth-label">Password</label>
                <input type="password" id="password" class="auth-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="auth-button-primary">Login</button>
        </form>

        <!-- divider -->
        <div class="auth-divider">or</div>

        <!-- google sign-in -->
        <button id="google-signin" class="auth-button-google">
            🔑 Sign in with Google
        </button>

        <!-- helper links -->
        <div class="auth-helpers">
            <p>Don't have an account? <a href="/signup">Sign up</a></p>
            <p>Forgot your password? <a href="/reset-password">Reset password</a></p>
        </div>

    </div>

    <!-- ─────────────────────────────────────────────────────────────
         FIREBASE AUTH MODULE
         (logic unchanged — just updated to use new CSS classes)
         ───────────────────────────────────────────────────────────── -->
    <script type="module">
        import { firebaseConfig } from "/static/firebase-config.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import {
            getAuth,
            signInWithEmailAndPassword,
            GoogleAuthProvider,
            signInWithPopup,
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const errorMsg = document.getElementById("error-msg");

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = "block";
        }

        async function sendTokenToBackend(user) {
            const idToken = await user.getIdToken();
            const response = await fetch("/auth/session", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ idToken }),
            });

            if (response.ok) {
                window.location.href = "/home";
            } else {
                showError("Something went wrong. Please try again.");
            }
        }

        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                const result = await signInWithEmailAndPassword(auth, email, password);
                await sendTokenToBackend(result.user);
            } catch (err) {
                if (err.code === "auth/invalid-credential" || err.code === "auth/wrong-password") {
                    showError("Wrong email or password. Try again!");
                } else if (err.code === "auth/user-not-found") {
                    showError("No account with that email. Sign up first!");
                } else if (err.code === "auth/too-many-requests") {
                    showError("Too many tries. Wait a minute and try again.");
                } else {
                    showError("Login failed: " + err.message);
                }
            }
        });

        document.getElementById("google-signin").addEventListener("click", async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                await sendTokenToBackend(result.user);
            } catch (err) {
                if (err.code !== "auth/popup-closed-by-user") {
                    showError("Google sign-in failed: " + err.message);
                }
            }
        });
    </script>
</body>
</html>
