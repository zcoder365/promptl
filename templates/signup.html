<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promptl — Sign Up</title>
    <link rel="shortcut icon" href="/static/assets/favicon.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body align="center">
    <br><br><br>
    <img src="/static/assets/logo.png" alt="promptl logo" height="100">

    <h2>Sign Up</h2>

    <p id="error-msg" class="message" style="display:none;"></p>

    <!-- email/password signup form -->
    <form id="signup-form">
        <label for="email">Email:</label><br>
        <input type="email" id="email" required><br><br>

        <label for="password">Password (at least 6 characters):</label><br>
        <input type="password" id="password" required minlength="6"><br><br>

        <button type="submit">Create Account</button>
    </form>

    <br>
    <p>— or —</p>

    <!-- google sign-up button (same flow as sign-in) -->
    <button id="google-signup" class="save-writing" style="max-width:300px;">
        🔑 Sign up with Google
    </button>

    <br><br>
    <p>Already have an account? <a href="/login">Login</a></p>

    <script type="module">
        // ✅ import config from shared file (same as login.html)
        import { firebaseConfig } from "/static/firebase-config.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import {
            getAuth,
            createUserWithEmailAndPassword,  // ← the only difference from login!
            GoogleAuthProvider,
            signInWithPopup,
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const errorMsg = document.getElementById("error-msg");

        // helper: show an error to the user
        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = "block";
        }

        // helper: after firebase signup succeeds, send the ID token to flask
        // (this is identical to the login version — same backend endpoint)
        async function sendTokenToBackend(user) {
            const idToken = await user.getIdToken();
            const response = await fetch("/auth/session", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ idToken }),
            });

            if (response.ok) {
                window.location.href = "/home";  // success — go write a story!
            } else {
                showError("Something went wrong. Please try again.");
            }
        }

        // email/password signup
        document.getElementById("signup-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                // createUserWithEmailAndPassword creates the firebase auth user.
                // it auto-signs them in too, so we get back a logged-in user immediately.
                const result = await createUserWithEmailAndPassword(auth, email, password);
                await sendTokenToBackend(result.user);
            } catch (err) {
                // map firebase's error codes to friendly messages
                if (err.code === "auth/email-already-in-use") {
                    showError("That email is already registered. Try logging in!");
                } else if (err.code === "auth/weak-password") {
                    showError("Password is too short. Use at least 6 characters.");
                } else if (err.code === "auth/invalid-email") {
                    showError("That doesn't look like a valid email address.");
                } else {
                    showError("Sign up failed: " + err.message);
                }
            }
        });

        // google signup (identical to login — firebase auto-creates the account)
        document.getElementById("google-signup").addEventListener("click", async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                await sendTokenToBackend(result.user);
            } catch (err) {
                showError("Google sign-up failed: " + err.message);
            }
        });
    </script>
</body>
</html>
