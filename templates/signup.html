<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promptl — Sign Up</title>
    <link rel="shortcut icon" href="/static/assets/favicon.png" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="auth-page">

    <div class="auth-card">

        <img src="/static/assets/logo.png" alt="promptl logo" class="auth-logo">
        <h1 class="auth-title">Let's start writing! ✏️</h1>
        <p class="auth-subtitle">Create your account in seconds</p>

        <div id="error-msg" class="auth-error" style="display:none;"></div>

        <!-- email/password signup form -->
        <form id="signup-form" class="auth-form">
            <div class="auth-field">
                <label for="email" class="auth-label">Email</label>
                <input type="email" id="email" class="auth-input" placeholder="you@example.com" required>
            </div>

            <div class="auth-field">
                <label for="password" class="auth-label">Password (6+ characters)</label>
                <input type="password" id="password" class="auth-input" placeholder="••••••••" required minlength="6">
            </div>

            <button type="submit" class="auth-button-primary">Create account</button>
        </form>

        <div class="auth-divider">or</div>

        <button id="google-signup" class="auth-button-google">
            🔑 Sign up with Google
        </button>

        <div class="auth-helpers">
            <p>Already have an account? <a href="/login">Login</a></p>
        </div>

    </div>

    <script type="module">
        import { firebaseConfig } from "/static/firebase-config.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import {
            getAuth,
            createUserWithEmailAndPassword,
            GoogleAuthProvider,
            signInWithPopup,
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const errorMsg = document.getElementById("error-msg");

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = "block";
        }

        async function sendTokenToBackend(user) {
            const idToken = await user.getIdToken();
            const response = await fetch("/auth/session", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ idToken }),
            });

            if (response.ok) {
                window.location.href = "/home";
            } else {
                showError("Something went wrong. Please try again.");
            }
        }

        document.getElementById("signup-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                const result = await createUserWithEmailAndPassword(auth, email, password);
                await sendTokenToBackend(result.user);
            } catch (err) {
                if (err.code === "auth/email-already-in-use") {
                    showError("That email is already registered. Try logging in!");
                } else if (err.code === "auth/weak-password") {
                    showError("Password is too short. Use at least 6 characters.");
                } else if (err.code === "auth/invalid-email") {
                    showError("That doesn't look like a valid email address.");
                } else {
                    showError("Sign up failed: " + err.message);
                }
            }
        });

        document.getElementById("google-signup").addEventListener("click", async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                await sendTokenToBackend(result.user);
            } catch (err) {
                if (err.code !== "auth/popup-closed-by-user") {
                    showError("Google sign-up failed: " + err.message);
                }
            }
        });
    </script>
</body>
</html>
